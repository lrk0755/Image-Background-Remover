<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>图片背景去除工具</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      overflow: hidden;
    }
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 30px;
      text-align: center;
    }
    .header h1 { font-size: 28px; margin-bottom: 10px; }
    .header .privacy {
      font-size: 12px;
      opacity: 0.9;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }
    .content { padding: 30px; }
    
    /* 上传区域 */
    .upload-area {
      border: 3px dashed #ddd;
      border-radius: 15px;
      padding: 40px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
    }
    .upload-area:hover { border-color: #667eea; background: #f8f9ff; }
    .upload-area.dragover { border-color: #667eea; background: #f0f3ff; }
    .upload-icon { font-size: 48px; margin-bottom: 15px; }
    .upload-text { color: #666; }
    .upload-hint { color: #999; font-size: 12px; margin-top: 10px; }
    
    /* 预览区域 */
    .preview-area {
      display: none;
      margin-top: 30px;
    }
    .preview-area.show { display: block; }
    .preview-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    .preview-box {
      background: #f5f5f5;
      border-radius: 10px;
      padding: 15px;
      text-align: center;
    }
    .preview-box h3 { margin-bottom: 10px; color: #333; }
    .preview-box img {
      max-width: 100%;
      border-radius: 8px;
    }
    .preview-original { background: repeating-conic-gradient(#ccc 0% 25%, white 0% 50%) 50% / 20px 20px; }
    
    /* 按钮 */
    .btn {
      display: block;
      width: 100%;
      padding: 15px 30px;
      margin-top: 20px;
      font-size: 18px;
      font-weight: bold;
      color: white;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .btn:hover { transform: scale(1.02); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-download {
      background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
      display: none;
    }
    .btn-download.show { display: block; }
    
    /* 加载 */
    .loading {
      display: none;
      text-align: center;
      padding: 20px;
    }
    .loading.show { display: block; }
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #f3f3f3;
      border-top: 4px solid #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 15px;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    
    input[type="file"] { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🖼️ 图片背景去除</h1>
      <div class="privacy">🔒 您的图片仅在内存中处理，不会上传保存</div>
    </div>
    
    <div class="content">
      <!-- 上传区域 -->
      <div class="upload-area" id="uploadArea">
        <div class="upload-icon">📁</div>
        <div class="upload-text">点击或拖拽图片到这里</div>
        <div class="upload-hint">支持 PNG、JPG、WebP，最大 10MB</div>
      </div>
      <input type="file" id="fileInput" accept="image/*">
      
      <!-- 加载中 -->
      <div class="loading" id="loading">
        <div class="spinner"></div>
        <div>正在去除背景...</div>
      </div>
      
      <!-- 预览区域 -->
      <div class="preview-area" id="previewArea">
        <div class="preview-grid">
          <div class="preview-box preview-original">
            <h3>原图</h3>
            <img id="originalImg" alt="原图">
          </div>
          <div class="preview-box">
            <h3>结果</h3>
            <img id="resultImg" alt="结果">
          </div>
        </div>
        <button class="btn btn-download" id="downloadBtn">⬇️ 下载去除背景的图片</button>
      </div>
      
      <button class="btn" id="processBtn" style="display:none">✨ 去除背景</button>
    </div>
  </div>

  <script>
    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('fileInput');
    const processBtn = document.getElementById('processBtn');
    const previewArea = document.getElementById('previewArea');
    const loading = document.getElementById('loading');
    const originalImg = document.getElementById('originalImg');
    const resultImg = document.getElementById('resultImg');
    const downloadBtn = document.getElementById('downloadBtn');

    let selectedFile = null;
    let resultData = null;

    // 上传点击
    uploadArea.addEventListener('click', () => fileInput.click());

    // 拖拽
    uploadArea.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadArea.classList.add('dragover');
    });
    uploadArea.addEventListener('dragleave', () => {
      uploadArea.classList.remove('dragover');
    });
    uploadArea.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadArea.classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      if (file) handleFile(file);
    });

    // 文件选择
    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) handleFile(file);
    });

    function handleFile(file) {
      if (!file.type.startsWith('image/')) {
        alert('请选择图片文件');
        return;
      }
      if (file.size > 10 * 1024 * 1024) {
        alert('图片大小不能超过 10MB');
        return;
      }
      
      selectedFile = file;
      const reader = new FileReader();
      reader.onload = (e) => {
        originalImg.src = e.target.result;
        uploadArea.style.display = 'none';
        processBtn.style.display = 'block';
      };
      reader.readAsDataURL(file);
    }

    // 处理图片
    processBtn.addEventListener('click', async () => {
      if (!selectedFile) return;

      processBtn.style.display = 'none';
      loading.classList.add('show');

      try {
        // 转 Base64
        const base64 = await fileToBase64(selectedFile);
        
        // 调用 API (需要配置后端地址)
        // 这里演示用，实际需要部署后端
        const response = await fetch('/api/remove-bg', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ image: base64.split(',')[1] })
        });

        const data = await response.json();
        if (data.image) {
          resultData = 'data:image/png;base64,' + data.image;
          resultImg.src = resultData;
          previewArea.classList.add('show');
          downloadBtn.classList.add('show');
        } else {
          alert(data.error || '处理失败');
        }
      } catch (error) {
        alert('处理失败: ' + error.message);
      } finally {
        loading.classList.remove('show');
      }
    });

    // 下载
    downloadBtn.addEventListener('click', () => {
      if (!resultData) return;
      const link = document.createElement('a');
      link.download = 'removed-bg.png';
      link.href = resultData;
      link.click();
    });

    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }
  </script>
</body>
</html>
